name: Build BrotherScanCenter EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer dependances
        run: |
          python -m pip install --upgrade pip
          pip install Pillow pyinstaller cryptography watchdog pystray pywin32 requests psutil packaging
        shell: cmd

      - name: Afficher structure
        run: |
          echo "Structure du repo :"
          dir /s /b *.py
        shell: cmd

      - name: Compiler
        run: |
          cd /d "%GITHUB_WORKSPACE%"
          echo "Recherche de main.py..."
          for /r . %%f in (main.py) do set MAINDIR=%%~dpf
          echo "Dossier trouve : %MAINDIR%"
          cd /d "%MAINDIR%"
          echo "Dossier courant :"
          cd
          echo "Fichiers presents :"
          dir
          echo "Sous-dossiers :"
          dir /ad
          python generate_icon.py
          pyinstaller --onefile --windowed --name=BrotherScanCenter --icon=assets\icon.ico --add-data="assets;assets" --hidden-import=win32api --hidden-import=win32con --hidden-import=win32gui --hidden-import=pystray --hidden-import=PIL._tkinter_finder --hidden-import=cryptography --hidden-import=watchdog.observers.winapi --collect-all=pystray --collect-all=cryptography main.py
        shell: cmd

      - name: Verifier exe
        run: |
          echo "Recherche du exe genere :"
          dir /s /b BrotherScanCenter.exe
        shell: cmd

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: BrotherScanCenter-Windows
          path: |
            **/dist/BrotherScanCenter.exe
          if-no-files-found: warn
          retention-days: 30
