name: Build BrotherScanCenter EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verifier tous les fichiers
        run: |
          echo "=== STRUCTURE COMPLETE ==="
          dir /s /b
          echo.
          echo "=== VERIFICATION FICHIERS OBLIGATOIRES ==="
          if exist "BrotherScanCenter\main.py" (echo OK main.py) else (echo MANQUANT main.py)
          if exist "BrotherScanCenter\bootstrap.py" (echo OK bootstrap.py) else (echo MANQUANT bootstrap.py)
          if exist "BrotherScanCenter\config_manager.py" (echo OK config_manager.py) else (echo MANQUANT config_manager.py)
          if exist "BrotherScanCenter\generate_icon.py" (echo OK generate_icon.py) else (echo MANQUANT generate_icon.py)
          if exist "BrotherScanCenter\build.py" (echo OK build.py) else (echo MANQUANT build.py)
          if exist "BrotherScanCenter\core\scanner.py" (echo OK core\scanner.py) else (echo MANQUANT core\scanner.py)
          if exist "BrotherScanCenter\core\email_sender.py" (echo OK core\email_sender.py) else (echo MANQUANT core\email_sender.py)
          if exist "BrotherScanCenter\core\file_watcher.py" (echo OK core\file_watcher.py) else (echo MANQUANT core\file_watcher.py)
          if exist "BrotherScanCenter\core\network_discovery.py" (echo OK core\network_discovery.py) else (echo MANQUANT core\network_discovery.py)
          if exist "BrotherScanCenter\core\__init__.py" (echo OK core\__init__.py) else (echo MANQUANT core\__init__.py)
          if exist "BrotherScanCenter\ui\main_window.py" (echo OK ui\main_window.py) else (echo MANQUANT ui\main_window.py)
          if exist "BrotherScanCenter\ui\setup_wizard_ui.py" (echo OK ui\setup_wizard_ui.py) else (echo MANQUANT ui\setup_wizard_ui.py)
          if exist "BrotherScanCenter\ui\tray.py" (echo OK ui\tray.py) else (echo MANQUANT ui\tray.py)
          if exist "BrotherScanCenter\ui\__init__.py" (echo OK ui\__init__.py) else (echo MANQUANT ui\__init__.py)
          if exist "BrotherScanCenter\assets\icon.ico" (echo OK assets\icon.ico) else (echo MANQUANT assets\icon.ico)
        shell: cmd

      - name: Installer dependances
        run: |
          python -m pip install --upgrade pip
          pip install Pillow pyinstaller cryptography watchdog pystray pywin32 requests psutil packaging
        shell: cmd

      - name: Compiler
        run: |
          cd /d "%GITHUB_WORKSPACE%\BrotherScanCenter"
          echo "Dossier courant :"
          cd
          python generate_icon.py
          pyinstaller --onefile --windowed --name=BrotherScanCenter --icon=assets\icon.ico --add-data="assets;assets" --hidden-import=win32api --hidden-import=win32con --hidden-import=win32gui --hidden-import=pystray --hidden-import=PIL._tkinter_finder --hidden-import=cryptography --hidden-import=watchdog.observers.winapi --collect-all=pystray --collect-all=cryptography main.py
        shell: cmd

      - name: Verifier exe
        run: |
          dir /s /b BrotherScanCenter.exe
        shell: cmd

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: BrotherScanCenter-Windows
          path: |
            **/dist/BrotherScanCenter.exe
          if-no-files-found: warn
          retention-days: 30
